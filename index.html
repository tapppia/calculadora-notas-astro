<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Notas Pro - Astrofísica</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Oswald', sans-serif;
        background-color: #f9f9f9;
        color: black;
        text-align: center;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 650px;
        margin: auto;
        padding: 20px;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 {
        background-color: #FFD60A;
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-size: 28px;
        margin-top: 0;
    }
    label {
        display: block;
        margin-top: 15px;
        font-size: 18px;
        text-align: left;
        font-weight: bold;
    }
    input, select {
        padding: 10px;
        font-size: 16px;
        width: 100%;
        margin-top: 5px;
        border-radius: 8px;
        border: 2px solid #FFD60A;
        text-align: center;
        font-family: 'Oswald', sans-serif;
        background-color: white;
        box-sizing: border-box;
    }
    
    /* Estilos para el selector y sus grupos */
    .yellow-select {
        background-color: white;
        cursor: pointer;
    }
    optgroup {
        background-color: #f0f0f0;
        color: #333;
        font-style: normal;
        font-weight: bold;
        text-align: center;
    }
    option {
        background-color: white;
        color: black;
        text-align: left;
        padding: 5px;
    }

    .btn {
        margin-top: 15px;
        background-color: #FFD60A;
        color: white;
        border: none;
        padding: 12px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 8px;
        font-family: 'Oswald', sans-serif;
        width: 100%;
        transition: 0.3s;
        text-transform: uppercase;
        font-weight: bold;
    }
    .btn:hover {
        background-color: #e6c109;
        transform: translateY(-1px);
    }
    .results {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background-color: #FFD60A;
        color: white;
        font-size: 20px;
        font-weight: bold;
    }
    .note-input {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        gap: 10px;
    }
    .note-input input {
        width: 100%;
    }
    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        background: white;
    }
    th, td {
        border: 1px solid #FFD60A;
        padding: 10px;
        font-size: 15px;
    }
    th {
        background-color: #FFD60A;
        color: white;
    }
    td button {
        background-color: #FFD60A;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 5px;
        font-family: 'Oswald', sans-serif;
        margin: 2px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Notas</h1>

    <label for="curso">Selecciona el curso:</label>
    <select id="curso" class="yellow-select">
        <option value="" disabled selected>Selecciona un curso</option>
        
        <optgroup label="─── SEMESTRE I ───">
            <option>Introducción a la Física I</option>
            <option>Bases Matemáticas para la Física I</option>
            <option>Física Computacional I</option>
            <option>Datos Físicos I</option>
            <option>Gestión Personal</option>
            <option>Introducción a la Astrofisica</option>
            <option>Inglés I</option>
        </optgroup>

        <optgroup label="─── SEMESTRE II ───">
            <option>Introducción a la Física II</option>
            <option>Bases Matemáticas para la Física II</option>
            <option>Física Computacional II</option>
            <option>Datos Físicos II</option>
            <option>Introducción a la Ciencia de Datos</option>
            <option>Comunicación científica</option>
            <option>Inglés II</option>
        </optgroup>

        <optgroup label="─── SEMESTRE III ───">
            <option>Mecánica Newtoniana</option>
            <option>Cálculo Vectorial</option>
            <option>Física Computacional III</option>
            <option>Estructura de la Materia</option>
            <option>Termodinamica</option>
            <option>Desarrollo de Software</option>
            <option>Inglés III</option>
        </optgroup>

        <optgroup label="─── SEMESTRE IV ───">
            <option>Electromagnetismo</option>
            <option>Ondas</option>
            <option>Métodos Matemáticos para la Física I</option>
            <option>Física Computacional IV</option>
            <option>Introducción a la Estadística Moderna</option>
            <option>Proyecto de Especialidad</option>
            <option>Inglés IV</option>
        </optgroup>

        <optgroup label="─── SEMESTRE V ───">
            <option>Mecánica Clásica</option>
            <option>Fenómenos cuánticos</option>
            <option>Métodos Matemáticos para la Física II</option>
            <option>Astrofísica Estelar</option>
            <option>Astrofísica Observacional</option>
            <option>Electivo I</option>
        </optgroup>

        <optgroup label="─── SEMESTRE VI ───">
            <option>Mecanica de Fluidos</option>
            <option>Mecánica Estadística</option>
            <option>Inferencia y modelos estadísticos</option>
            <option>Astrofísica galáctica y cosmologia</option>
            <option>Estructura y bases de datos</option>
            <option>Electivo II</option>
        </optgroup>

        <optgroup label="─── SEMESTRE VII+ ───">
            <option>Procesos radiativos y difusos</option>
            <option>Instrumentación y tecnología astronómica</option>
            <option>Modelamiento en Astrofísica</option>
            <option>Astrofísica y Big Data</option>
            <option>Electivo III</option>
            <option>Trabajo de titulación</option>
        </optgroup>
    </select>

    <label for="notaAprobacion">Nota mínima para aprobar:</label>
    <input type="number" id="notaAprobacion" step="0.1" value="4.0" min="1.0" max="7.0">

    <label for="cantidadNotas">Cantidad de notas:</label>
    <input type="number" id="cantidadNotas" min="1" max="10" value="3">

    <button class="btn" id="btnModo" onclick="toggleMode()">Modo: Promedio Simple</button>

    <div id="notasContainer"></div>

    <button class="btn" onclick="guardarCurso()" style="background-color: #222;">Guardar curso en historial</button>

    <div class="results" id="resultados">Ingresa tus notas para calcular</div>

    <h2 style="margin-top:30px; color: #333;">📚 Cursos guardados</h2>
    <table id="tablaCursos">
        <tr><th>Curso</th><th>Promedio</th><th>Acciones</th></tr>
    </table>
</div>

<script>
let esPonderado = false;

function toggleMode() {
    esPonderado = !esPonderado;
    document.getElementById("btnModo").textContent = esPonderado ? "Modo: Promedio Ponderado" : "Modo: Promedio Simple";
    generarCampos();
}

document.getElementById("cantidadNotas").addEventListener("input", generarCampos);

// Generar campos iniciales
generarCampos();
cargarTabla();

function generarCampos(notas = [], pesos = []) {
    const contenedor = document.getElementById("notasContainer");
    contenedor.innerHTML = "";
    const cantidad = parseInt(document.getElementById("cantidadNotas").value) || 0;
    
    for (let i = 0; i < cantidad; i++) {
        const div = document.createElement("div");
        div.classList.add("note-input");
        
        const notaInput = document.createElement("input");
        notaInput.type = "number";
        notaInput.step = "0.1";
        notaInput.placeholder = `Nota ${i+1}`;
        if (notas[i] !== undefined && notas[i] !== null) notaInput.value = notas[i];
        notaInput.oninput = calcular;
        div.appendChild(notaInput);

        if (esPonderado) {
            const pesoInput = document.createElement("input");
            pesoInput.type = "number";
            pesoInput.step = "1";
            pesoInput.placeholder = "% Peso";
            if (pesos[i] !== undefined && pesos[i] !== null) pesoInput.value = pesos[i];
            pesoInput.oninput = calcular;
            div.appendChild(pesoInput);
        }

        contenedor.appendChild(div);
    }
}

function calcular() {
    const notaAprobacion = parseFloat(document.getElementById("notaAprobacion").value);
    const filas = document.querySelectorAll("#notasContainer .note-input");
    let sumaPesos = 0, sumaNotas = 0, notasIngresadas = 0;
    let notasArr = [], pesosArr = [];

    filas.forEach(fila => {
        const nota = parseFloat(fila.children[0].value);
        const peso = esPonderado ? parseFloat(fila.children[1]?.value) : null;
        
        notasArr.push(isNaN(nota) ? null : nota);
        if (esPonderado) pesosArr.push(isNaN(peso) ? null : peso);

        if (!isNaN(nota)) {
            notasIngresadas++;
            if (esPonderado && !isNaN(peso)) {
                sumaNotas += (nota * (peso / 100));
                sumaPesos += peso;
            } else if (!esPonderado) {
                sumaNotas += nota;
            }
        }
    });

    let promedio = 0;
    if (esPonderado) {
        promedio = sumaNotas; // Ya está ponderado por el %
        if (sumaPesos < 100 && sumaPesos > 0) {
            // Si no llegamos al 100%, calculamos el promedio relativo
            promedio = (sumaNotas / sumaPesos) * 100;
        }
    } else if (notasIngresadas > 0) {
        promedio = sumaNotas / notasIngresadas;
    }
    
    promedio = parseFloat(promedio.toFixed(1));

    let resultado = `Promedio actual: ${isNaN(promedio) || notasIngresadas === 0 ? "-" : promedio}`;
    
    if (!isNaN(promedio) && notasIngresadas > 0) {
        if (promedio >= notaAprobacion) {
            resultado += `<br>✅ ¡Vas aprobando!`;
        } else {
            const notasRestantes = filas.length - notasIngresadas;
            if (notasRestantes > 0) {
                if (!esPonderado) {
                    const puntosNecesarios = (notaAprobacion * filas.length) - sumaNotas;
                    const notaNecesaria = puntosNecesarios / notasRestantes;
                    if (notaNecesaria > 7) {
                        resultado += `<br>⚠️ Necesitas: ${notaNecesaria.toFixed(1)} (Casi imposible)`;
                    } else {
                        resultado += `<br>Necesitas: ${notaNecesaria.toFixed(1)} promedio en lo que falta.`;
                    }
                } else {
                    resultado += `<br>Falta completar el 100% del peso.`;
                }
            } else {
                resultado += `<br>❌ Reprobado`;
            }
        }
    }
    document.getElementById("resultados").innerHTML = resultado;
    return { promedio, notasArr, pesosArr };
}

function guardarCurso() {
    const curso = document.getElementById("curso").value;
    if (!curso) { alert("Por favor, selecciona un curso de la lista."); return; }
    
    const { promedio, notasArr, pesosArr } = calcular();
    if (isNaN(promedio) || notasArr.filter(n => n !== null).length === 0) { 
        alert("Ingresa al menos una nota para guardar."); return; 
    }

    const datos = {
        curso: curso,
        promedio: promedio,
        modo: esPonderado ? "ponderado" : "simple",
        notaAprobacion: parseFloat(document.getElementById("notaAprobacion").value),
        notas: notasArr,
        pesos: esPonderado ? pesosArr : []
    };

    let guardados = JSON.parse(localStorage.getItem("cursosGuardados")) || [];
    const index = guardados.findIndex(c => c.curso === curso);
    
    if (index >= 0) {
        guardados[index] = datos;
    } else {
        guardados.push(datos);
    }
    
    localStorage.setItem("cursosGuardados", JSON.stringify(guardados));
    cargarTabla();
}

function cargarTabla() {
    const tabla = document.getElementById("tablaCursos");
    tabla.innerHTML = `<tr><th>Curso</th><th>Promedio</th><th>Acciones</th></tr>`;
    let guardados = JSON.parse(localStorage.getItem("cursosGuardados")) || [];
    
    guardados.forEach(c => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${c.curso}</td>
            <td>${c.promedio}</td>
            <td>
                <button onclick="cargarCurso('${c.curso}')">Cargar</button>
                <button onclick="borrarCurso('${c.curso}')" style="background-color: #ff4d4d;">Borrar</button>
            </td>
        `;
        tabla.appendChild(tr);
    });
}

function cargarCurso(nombre) {
    let guardados = JSON.parse(localStorage.getItem("cursosGuardados")) || [];
    const curso = guardados.find(c => c.curso === nombre);
    if (!curso) return;

    document.getElementById("curso").value = curso.curso;
    document.getElementById("notaAprobacion").value = curso.notaAprobacion;
    esPonderado = curso.modo === "ponderado";
    document.getElementById("btnModo").textContent = esPonderado ? "Modo: Promedio Ponderado" : "Modo: Promedio Simple";
    document.getElementById("cantidadNotas").value = curso.notas.length;
    
    generarCampos(curso.notas, curso.pesos);
    calcular();
}

function borrarCurso(nombre) {
    if(!confirm(`¿Estás seguro de borrar ${nombre}?`)) return;
    let guardados = JSON.parse(localStorage.getItem("cursosGuardados")) || [];
    guardados = guardados.filter(c => c.curso !== nombre);
    localStorage.setItem("cursosGuardados", JSON.stringify(guardados));
    cargarTabla();
}
</script>

</body>
</html>
