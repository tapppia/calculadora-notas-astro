<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Astrofísica - Notas & Predicción</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD60A;
            --primary-dark: #e6c109;
            --success: #4CAF50;
            --danger: #f44336;
            --bg: #f4f4f9;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin: -10px 0 25px 0;
            text-transform: uppercase;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        optgroup { background: #eee; font-weight: bold; }

        /* Barra de Progreso */
        .progress-wrapper {
            margin: 25px 0 10px 0;
            background: #eee;
            border-radius: 50px;
            height: 30px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--danger);
            transition: width 0.6s ease-in-out, background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-mode { background: var(--primary); color: white; }
        .btn-save { background: #333; color: white; }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }

        .note-input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .results-box {
            margin-top: 10px;
            padding: 15px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .needed-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .btn-load { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Oswald'; }
        .btn-del { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Oswald'; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Notas</h1>

    <label>Asignatura:</label>
    <select id="curso">
        <option value="" disabled selected>Selecciona un curso</option>
        <optgroup label="─── SEMESTRE I ───">
            <option>Introducción a la Física I</option>
            <option>Bases Matemáticas para la Física I</option>
            <option>Física Computacional I</option>
            <option>Datos Físicos I</option>
            <option>Gestión Personal</option>
            <option>Introducción a la Astrofisica</option>
            <option>Inglés I</option>
        </optgroup>
        <optgroup label="─── SEMESTRE II ───">
            <option>Introducción a la Física II</option>
            <option>Bases Matemáticas para la Física II</option>
            <option>Física Computacional II</option>
            <option>Datos Físicos II</option>
            <option>Introducción a la Ciencia de Datos</option>
            <option>Comunicación científica</option>
            <option>Inglés II</option>
        </optgroup>
        <optgroup label="─── SEMESTRE III+ ───">
            <option>Mecánica Newtoniana</option>
            <option>Cálculo Vectorial</option>
            <option>Electromagnetismo</option>
            <option>Termodinámica</option>
            <option>Astrofísica Estelar</option>
        </optgroup>
    </select>

    <div style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label>Mínimo Aprobar:</label>
            <input type="number" id="notaAprobacion" step="0.1" value="4.0">
        </div>
        <div style="flex: 1;">
            <label>N° de Notas:</label>
            <input type="number" id="cantidadNotas" min="1" max="15" value="3">
        </div>
    </div>

    <button class="btn btn-mode" id="btnModo" onclick="toggleMode()">Modo: Promedio Simple</button>

    <div id="notasContainer"></div>

    <div class="progress-wrapper">
        <div id="barraProgreso" class="progress-bar">0.0</div>
    </div>

    <div class="results-box" id="resultados">Ingresa tus notas...</div>

    <button class="btn btn-save" onclick="guardarCurso()">Guardar en Historial</button>

    <h2>📚 Mis Cursos</h2>
    <table id="tablaCursos">
        <thead>
            <tr><th>Curso</th><th>Nota</th><th>Acciones</th></tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    let esPonderado = false;

    document.getElementById("cantidadNotas").addEventListener("input", generarCampos);
    generarCampos();
    cargarTabla();

    function toggleMode() {
        esPonderado = !esPonderado;
        document.getElementById("btnModo").textContent = esPonderado ? "Modo: Promedio Ponderado" : "Modo: Promedio Simple";
        generarCampos();
    }

    function generarCampos(notas = [], pesos = []) {
        const contenedor = document.getElementById("notasContainer");
        contenedor.innerHTML = "";
        const cantidad = parseInt(document.getElementById("cantidadNotas").value) || 0;

        for (let i = 0; i < cantidad; i++) {
            const div = document.createElement("div");
            div.className = "note-input-row";
            const nInput = document.createElement("input");
            nInput.type = "number"; nInput.step = "0.1"; nInput.placeholder = `Nota ${i+1}`;
            if (notas[i]) nInput.value = notas[i];
            nInput.oninput = calcular;
            div.appendChild(nInput);

            if (esPonderado) {
                const pInput = document.createElement("input");
                pInput.type = "number"; pInput.placeholder = "% Peso";
                if (pesos[i]) pInput.value = pesos[i];
                pInput.oninput = calcular;
                div.appendChild(pInput);
            }
            contenedor.appendChild(div);
        }
        calcular();
    }

    function calcular() {
        const minAprobar = parseFloat(document.getElementById("notaAprobacion").value) || 4.0;
        const nTotal = parseInt(document.getElementById("cantidadNotas").value) || 0;
        const filas = document.querySelectorAll(".note-input-row");
        
        let sumaTotalObtenida = 0;
        let notasIngresadas = 0;
        let sumaPesos = 0;

        filas.forEach(fila => {
            const nota = parseFloat(fila.children[0].value);
            if (!isNaN(nota)) {
                if (esPonderado) {
                    const peso = parseFloat(fila.children[1].value) || 0;
                    sumaTotalObtenida += (nota * (peso / 100));
                    sumaPesos += peso;
                } else {
                    sumaTotalObtenida += nota;
                }
                notasIngresadas++;
            }
        });

        let promActual = 0;
        if (esPonderado) {
            promActual = sumaPesos > 0 ? (sumaTotalObtenida / sumaPesos) * 100 : 0;
        } else {
            promActual = notasIngresadas > 0 ? sumaTotalObtenida / notasIngresadas : 0;
        }
        promActual = parseFloat(promActual.toFixed(1));

        actualizarUI(promActual, minAprobar, notasIngresadas, nTotal, sumaTotalObtenida, sumaPesos);
        return promActual;
    }

    function actualizarUI(prom, min, nIngresadas, nTotal, sumaTotal, sumaPesos) {
        const barra = document.getElementById("barraProgreso");
        const resBox = document.getElementById("resultados");
        
        // Actualizar Barra
        let porcBarra = (prom / 7) * 100;
        barra.style.width = Math.min(porcBarra, 100) + "%";
        barra.textContent = prom > 0 ? prom : "";
        barra.style.backgroundColor = prom >= min ? "#4CAF50" : (prom >= min - 1 ? "#FF9800" : "#f44336");

        // Lógica de Mensajes y Predicción
        let msg = `Promedio actual: <strong>${prom}</strong>`;
        const nRestantes = nTotal - nIngresadas;

        if (nIngresadas === 0) {
            msg = "Esperando notas...";
        } else if (prom >= min && nRestantes === 0) {
            msg += "<br>✅ ¡Felicidades! Aprobaste el curso.";
        } else if (prom < min && nRestantes === 0) {
            msg += "<br>❌ Reprobado. No alcanzas el mínimo.";
        } else if (nRestantes > 0) {
            if (!esPonderado) {
                const puntosFaltantes = (min * nTotal) - sumaTotal;
                const notaNecesaria = puntosFaltantes / nRestantes;
                
                if (notaNecesaria > 7.0) {
                    msg += `<br>⚠️ Necesitas un <strong>${notaNecesaria.toFixed(1)}</strong>. <br>Ya no es posible aprobar matemáticamente.`;
                } else if (notaNecesaria <= 1.0) {
                    msg += `<br>✨ ¡Ya aprobaste! Solo mantén el ritmo.`;
                } else {
                    msg += `<br>Para aprobar con ${min} necesitas un <span class="needed-badge">${notaNecesaria.toFixed(1)}</span> promedio en las ${nRestantes} notas restantes.`;
                }
            } else {
                // Modo Ponderado
                const pesoRestante = 100 - sumaPesos;
                if (pesoRestante > 0) {
                    const puntosFaltantes = min - sumaTotal; // sumaTotal aquí ya es nota * peso/100
                    const notaNecesaria = (puntosFaltantes / pesoRestante) * 100;
                    
                    if (notaNecesaria > 7.0) {
                        msg += `<br>⚠️ Necesitas un <strong>${notaNecesaria.toFixed(1)}</strong> en el ${pesoRestante}% restante. Muy difícil.`;
                    } else if (notaNecesaria <= 1.0) {
                        msg += `<br>✨ Con el peso actual ya estarías aprobando.`;
                    } else {
                        msg += `<br>Necesitas un <span class="needed-badge">${notaNecesaria.toFixed(1)}</span> en el ${pesoRestante}% restante para aprobar.`;
                    }
                }
            }
        }
        resBox.innerHTML = msg;
    }

    // --- Funciones de Persistencia (LocalStorage) ---
    function guardarCurso() {
        const curso = document.getElementById("curso").value;
        if (!curso) return alert("Selecciona una asignatura");
        const prom = calcular();
        const data = {
            id: curso, prom: prom, 
            modo: esPonderado ? 'ponderado' : 'simple',
            notas: Array.from(document.querySelectorAll(".note-input-row input:first-child")).map(i => i.value),
            pesos: esPonderado ? Array.from(document.querySelectorAll(".note-input-row input:last-child")).map(i => i.value) : [],
            min: document.getElementById("notaAprobacion").value
        };
        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];
        const idx = historial.findIndex(i => i.id === curso);
        if (idx > -1) historial[idx] = data; else historial.push(data);
        localStorage.setItem("misNotas", JSON.stringify(historial));
        cargarTabla();
    }

    function cargarTabla() {
        const tbody = document.getElementById("cuerpoTabla");
        tbody.innerHTML = "";
        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];
        historial.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${item.id}</td><td style="font-weight:bold">${item.prom}</td>
                <td><button class="btn-load" onclick="cargarCurso('${item.id}')">Ver</button>
                <button class="btn-del" onclick="borrarCurso('${item.id}')">✕</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function cargarCurso(id) {
        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];
        const item = historial.find(i => i.id === id);
        if (!item) return;
        document.getElementById("curso").value = item.id;
        document.getElementById("notaAprobacion").value = item.min;
        esPonderado = (item.modo === 'ponderado');
        document.getElementById("btnModo").textContent = esPonderado ? "Modo: Promedio Ponderado" : "Modo: Promedio Simple";
        document.getElementById("cantidadNotas").value = item.notas.length;
        generarCampos(item.notas, item.pesos);
    }

    function borrarCurso(id) {
        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];
        historial = historial.filter(i => i.id !== id);
        localStorage.setItem("misNotas", JSON.stringify(historial));
        cargarTabla();
    }
</script>
</body>
</html>
