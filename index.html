<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Notas Pro - Astrofísica</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD60A;
            --primary-dark: #e6c109;
            --success: #4CAF50;
            --danger: #f44336;
            --bg: #f4f4f9;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin: -10px 0 25px 0;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        optgroup {
            background: #eee;
            font-weight: bold;
        }

        /* --- Estilos de la Barra de Progreso --- */
        .progress-wrapper {
            margin: 25px 0;
            background: #eee;
            border-radius: 50px;
            height: 30px;
            width: 100%;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--danger);
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-mode { background: var(--primary); color: white; }
        .btn-save { background: #333; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .note-input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .results-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
            min-height: 50px;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }

        .action-btns button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Oswald';
            margin: 0 2px;
        }
        .btn-load { background: var(--primary); color: white; }
        .btn-del { background: #ff4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Notas</h1>

    <label>Asignatura:</label>
    <select id="curso">
        <option value="" disabled selected>Selecciona un curso</option>
        <optgroup label="─── SEMESTRE I ───">
            <option>Introducción a la Física I</option>
            <option>Bases Matemáticas para la Física I</option>
            <option>Física Computacional I</option>
            <option>Datos Físicos I</option>
            <option>Gestión Personal</option>
            <option>Introducción a la Astrofisica</option>
            <option>Inglés I</option>
        </optgroup>
        <optgroup label="─── SEMESTRE II ───">
            <option>Introducción a la Física II</option>
            <option>Bases Matemáticas para la Física II</option>
            <option>Física Computacional II</option>
            <option>Datos Físicos II</option>
            <option>Introducción a la Ciencia de Datos</option>
            <option>Comunicación científica</option>
            <option>Inglés II</option>
        </optgroup>
        <optgroup label="─── SEMESTRE III ───">
            <option>Mecánica Newtoniana</option>
            <option>Cálculo Vectorial</option>
            <option>Física Computacional III</option>
            <option>Estructura de la Materia</option>
            <option>Termodinamica</option>
            <option>Desarrollo de Software</option>
            <option>Inglés III</option>
        </optgroup>
        <optgroup label="─── SEMESTRE IV+ ───">
            <option>Electromagnetismo</option>
            <option>Ondas</option>
            <option>Métodos Matemáticos I</option>
            <option>Astrofísica Estelar</option>
            <option>Astrofísica Galáctica</option>
            <option>Trabajo de titulación</option>
        </optgroup>
    </select>

    <div style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label>Mínimo Aprobar:</label>
            <input type="number" id="notaAprobacion" step="0.1" value="4.0">
        </div>
        <div style="flex: 1;">
            <label>N° de Notas:</label>
            <input type="number" id="cantidadNotas" min="1" max="15" value="3">
        </div>
    </div>

    <button class="btn btn-mode" id="btnModo" onclick="toggleMode()">Modo: Promedio Simple</button>

    <div id="notasContainer"></div>

    <div class="progress-wrapper">
        <div id="barraProgreso" class="progress-bar">0.0</div>
    </div>

    <div class="results-box" id="resultados">Esperando notas...</div>

    <button class="btn btn-save" onclick="guardarCurso()">Guardar en Historial</button>

    <h2>📚 Mis Cursos</h2>
    <table id="tablaCursos">
        <thead>
            <tr><th>Curso</th><th>Nota</th><th>Acciones</th></tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    let esPonderado = false;

    // Inicialización
    document.getElementById("cantidadNotas").addEventListener("input", generarCampos);
    generarCampos();
    cargarTabla();

    function toggleMode() {
        esPonderado = !esPonderado;
        document.getElementById("btnModo").textContent = esPonderado ? "Modo: Promedio Ponderado" : "Modo: Promedio Simple";
        generarCampos();
    }

    function generarCampos(notas = [], pesos = []) {
        const contenedor = document.getElementById("notasContainer");
        contenedor.innerHTML = "";
        const cantidad = parseInt(document.getElementById("cantidadNotas").value) || 0;

        for (let i = 0; i < cantidad; i++) {
            const div = document.createElement("div");
            div.className = "note-input-row";

            const nInput = document.createElement("input");
            nInput.type = "number"; nInput.step = "0.1"; nInput.placeholder = `Nota ${i+1}`;
            if (notas[i] !== undefined) nInput.value = notas[i];
            nInput.oninput = calcular;
            div.appendChild(nInput);

            if (esPonderado) {
                const pInput = document.createElement("input");
                pInput.type = "number"; pInput.placeholder = "% Peso";
                if (pesos[i] !== undefined) pInput.value = pesos[i];
                pInput.oninput = calcular;
                div.appendChild(pInput);
            }
            contenedor.appendChild(div);
        }
        calcular();
    }

    function calcular() {
        const minAprobar = parseFloat(document.getElementById("notaAprobacion").value) || 4.0;
        const filas = document.querySelectorAll(".note-input-row");
        let sumaPonderada = 0;
        let sumaPesos = 0;
        let sumaSimple = 0;
        let notasContadas = 0;

        filas.forEach(fila => {
            const nota = parseFloat(fila.children[0].value);
            if (!isNaN(nota)) {
                if (esPonderado) {
                    const peso = parseFloat(fila.children[1].value) || 0;
                    sumaPonderada += (nota * (peso / 100));
                    sumaPesos += peso;
                } else {
                    sumaSimple += nota;
                    notasContadas++;
                }
            }
        });

        let promedioFinal = 0;
        if (esPonderado) {
            promedioFinal = sumaPesos > 0 ? (sumaPonderada / sumaPesos) * 100 : 0;
        } else {
            promedioFinal = notasContadas > 0 ? sumaSimple / notasContadas : 0;
        }

        promedioFinal = parseFloat(promedioFinal.toFixed(1));
        actualizarInterfaz(promedioFinal, minAprobar, notasContadas, sumaPesos);
        return promedioFinal;
    }

    function actualizarInterfaz(prom, min, cant, pesos) {
        const barra = document.getElementById("barraProgreso");
        const resBox = document.getElementById("resultados");

        // Actualizar Barra (escala 1 a 7)
        let porcentajeColor = (prom / 7) * 100;
        barra.style.width = Math.min(porcentajeColor, 100) + "%";
        barra.textContent = prom > 0 ? prom : "";
        
        if (prom >= min) {
            barra.style.backgroundColor = "#4CAF50"; // Verde
            resBox.innerHTML = `Promedio: ${prom} <br> <span style="font-size: 0.9rem">✅ ¡Vas súper bien!</span>`;
        } else {
            barra.style.backgroundColor = prom >= min - 1 ? "#FF9800" : "#f44336"; // Naranja o Rojo
            resBox.innerHTML = `Promedio: ${prom} <br> <span style="font-size: 0.9rem">⚠️ Bajo el mínimo (${min})</span>`;
        }
    }

    function guardarCurso() {
        const curso = document.getElementById("curso").value;
        if (!curso) return alert("Selecciona una asignatura primero");

        const prom = calcular();
        const filas = document.querySelectorAll(".note-input-row");
        let notasArr = [], pesosArr = [];

        filas.forEach(f => {
            notasArr.push(f.children[0].value);
            if(esPonderado) pesosArr.push(f.children[1].value);
        });

        const data = {
            id: curso,
            promedio: prom,
            modo: esPonderado ? 'ponderado' : 'simple',
            notas: notasArr,
            pesos: pesosArr,
            min: document.getElementById("notaAprobacion").value
        };

        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];
        const index = historial.findIndex(i => i.id === curso);
        if (index > -1) historial[index] = data; else historial.push(data);

        localStorage.setItem("misNotas", JSON.stringify(historial));
        cargarTabla();
    }

    function cargarTabla() {
        const tabla = document.getElementById("cuerpoTabla");
        tabla.innerHTML = "";
        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];

        historial.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${item.id}</td>
                <td style="font-weight:bold; color:${item.promedio >= item.min ? 'green' : 'red'}">${item.promedio}</td>
                <td class="action-btns">
                    <button class="btn-load" onclick="cargarCurso('${item.id}')">Ver</button>
                    <button class="btn-del" onclick="borrarCurso('${item.id}')">✕</button>
                </td>
            `;
            tabla.appendChild(tr);
        });
    }

    function cargarCurso(id) {
        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];
        const item = historial.find(i => i.id === id);
        if (!item) return;

        document.getElementById("curso").value = item.id;
        document.getElementById("notaAprobacion").value = item.min;
        esPonderado = (item.modo === 'ponderado');
        document.getElementById("btnModo").textContent = esPonderado ? "Modo: Promedio Ponderado" : "Modo: Promedio Simple";
        document.getElementById("cantidadNotas").value = item.notas.length;
        generarCampos(item.notas, item.pesos);
    }

    function borrarCurso(id) {
        if (!confirm("¿Borrar del historial?")) return;
        let historial = JSON.parse(localStorage.getItem("misNotas")) || [];
        historial = historial.filter(i => i.id !== id);
        localStorage.setItem("misNotas", JSON.stringify(historial));
        cargarTabla();
    }
</script>

</body>
</html>
